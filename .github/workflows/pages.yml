name: Deploy demo preview to GitHub Pages

# Builds demo/demo.md into a live HTML deck and publishes it to GitHub Pages
# on every push to main. Enable once in repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build demo deck to HTML
        run: |
          mkdir -p _site
          npx --yes @marp-team/marp-cli@latest demo/demo.md \
            --html \
            --theme-set css/serendipity-palette.css css/serendipity.css \
            -o _site/index.html
          # ship the images the deck references next to index.html
          cp demo/demo-fig.png demo/bg-serendipity.png _site/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
